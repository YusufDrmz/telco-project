services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: telco_oracle
    ports:
      - "1521:1521"
      - "5500:5500"   
    environment:
      ORACLE_PASSWORD: TelcoPass123   
      ORACLE_DATABASE: TELCODB       
      APP_USER: telco_user            
      APP_USER_PASSWORD: Telco1234    
    volumes:
      - oracle_data:/opt/oracle/oradata         
      - ./init-scripts:/container-entrypoint-initdb.d  
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s  

volumes:
  oracle_data:
    driver: local
